url: https://utkarshpawade.github.io/ppcviz/

template:
  bootstrap: 5
  bootswatch: cosmo
  bslib:
    primary: "#3F4A8A"

home:
  title: "ppcviz — Visual Predictive Check Diagnostics"
  description: >
    R package implementing Säilynoja et al. (2025) methodology for testing
    whether a chosen PPC plot faithfully represents your data distribution.
    Provides visualization PIT values, goodness-of-fit tests, PAVA calibration
    plots, and automatic plot recommendation.
  sidebar:
    structure: [links, license, dev]
  links:
    - text: "Source paper (arXiv:2503.01509)"
      href: https://arxiv.org/abs/2503.01509

navbar:
  bg: primary
  structure:
    left:  [intro, reference, articles]
    right: [github]
  components:
    intro:
      text: "Get started"
      href: articles/ppcviz-intro.html
    reference:
      text: "Reference"
      href: reference/index.html
    github:
      icon: fa-github
      href: https://github.com/utkarshpawade/ppcviz
      aria-label: GitHub

reference:
  - title: "Visualization PIT values"
    desc: >
      Compute probability integral transform (PIT) values for a specific
      plot type. If the resulting PIT values are uniform on [0, 1], the
      visualization is faithful to the data; non-uniformity reveals where
      the plot misleads.
    contents:
      - pit_kde
      - pit_histogram
      - pit_qdotplot

  - title: "Goodness-of-fit tests"
    desc: >
      Test whether PIT values are consistent with the uniform distribution
      using simultaneous ECDF confidence bands calibrated via Monte Carlo
      simulation (Säilynoja, Bürkner & Vehtari, 2022).
    contents:
      - viz_gof
      - check_viz

  - title: "Data property detection"
    desc: >
      Automatically detect discreteness, point masses, zero-inflation, and
      natural boundaries (non-negativity, proportions) in observed data
      before choosing a plot type.
    contents:
      - detect_discrete
      - detect_bounds

  - title: "Calibration plots"
    desc: >
      PAVA-based (isotonic regression) calibration plots for binary and
      discrete outcomes with bootstrap consistency intervals. These plots
      are not available in bayesplot and implement Sections 4-5 of the paper.
    contents:
      - ppc_calibration
      - ppc_calibration_residual
      - ppc_calibration_discrete

  - title: "Automatic recommender"
    desc: >
      Examines data properties and optionally runs a KDE goodness-of-fit
      test, then returns a prioritised recommendation of which PPC plot
      function to use for your data.
    contents:
      - recommend_ppc

footer:
  structure:
    right: built_with
